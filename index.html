<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>SATELLITE_VOX | ORBITAL_ARCHIVE</title>
    
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Space+Grotesk:wght@700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="styles.css">
    
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        "concrete-light": "#F2F2F2",
                        "concrete-mid": "#D9D9D9",
                        "concrete-dark": "#BDBDBD",
                        "structural-black": "#000000",
                        "warning-red": "#E63946",
                        "warning-yellow": "#FFD60A",
                    },
                    fontFamily: {
                        "brutalist": ["Archivo Black", "sans-serif"],
                        "wide": ["Space Grotesk", "sans-serif"],
                        "mono": ["JetBrains Mono", "monospace"]
                    }
                },
            },
        }
    </script>
</head>
<body class="min-h-screen structural-grid selection:bg-warning-yellow selection:text-black dark:bg-stone-950 transition-colors duration-300" id="prism-body">
    <header class="border-b-4 border-black dark:border-white bg-white dark:bg-stone-900 p-6 sticky top-0 z-50 flex justify-between items-center gap-6">
        <div class="flex items-center gap-4">
            <h1 class="font-brutalist text-2xl tracking-tighter dark:text-white uppercase">SATELLITE_VOX</h1>
            <span class="hidden md:block bg-warning-yellow border-2 border-black px-2 py-0.5 text-[10px] font-bold text-black uppercase tracking-widest">UPLINK_STABLE</span>
        </div>
        <nav class="flex gap-3">
            <button id="refresh-btn" class="border-2 border-black dark:border-white px-4 py-2 bg-warning-red text-white text-[10px] font-bold uppercase flex items-center gap-2 hover:bg-black dark:hover:bg-white dark:hover:text-black transition-all active:scale-95">
                <span class="material-symbols-outlined text-sm">sync</span> PULL
            </button>
            <button id="theme-toggle" class="border-2 border-black dark:border-white px-4 py-2 bg-white dark:bg-stone-800 text-black dark:text-white text-[10px] font-bold uppercase hover:bg-black hover:text-white dark:hover:bg-white dark:hover:text-black transition-all active:scale-95">
                THEME
            </button>
        </nav>
    </header>

    <div class="max-w-6xl mx-auto w-full px-6 py-12 space-y-12">
        <section class="bg-white dark:bg-stone-900 border-[6px] border-black dark:border-white p-8 block-shadow dark:shadow-[12px_12px_0px_0px_#f2f2f2]">
            <div class="flex items-center gap-3 mb-6 border-b-2 border-black dark:border-white pb-4">
                <span class="bg-warning-yellow border-2 border-black px-2 py-0.5 font-bold text-[10px] text-black">UPLINK_01</span>
                <h3 class="font-brutalist text-xl dark:text-white uppercase">Controller</h3>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-12 gap-6">
                <div class="md:col-span-12 space-y-2">
                    <label class="text-[10px] font-bold dark:text-gray-400 uppercase tracking-widest">Target_Query</label>
                    <div class="flex flex-col md:flex-row gap-3">
                        <input id="vault-search" class="w-full bg-concrete-light dark:bg-stone-950 border-4 border-black dark:border-white p-4 focus:ring-0 focus:bg-white dark:focus:bg-stone-800 text-lg font-mono uppercase dark:text-white placeholder:text-gray-500" placeholder="NAME / NORAD_ID" type="text"/>
                        <select id="sort-select" class="bg-white dark:bg-stone-950 border-4 border-black dark:border-white p-4 font-bold text-sm dark:text-white uppercase">
                            <option value="name">NAME</option>
                            <option value="id">SID</option>
                            <option value="popularity">POP</option>
                        </select>
                    </div>
                </div>
            </div>
        </section>

        <section class="space-y-6">
            <div class="flex justify-between items-end border-b-4 border-black dark:border-white pb-4">
                <h4 class="font-brutalist text-2xl dark:text-white uppercase">Telemetry_Logs</h4>
                <p class="text-[10px] font-bold text-gray-500 uppercase tracking-widest">Live_Archive</p>
            </div>
            
            <div id="link-vault-grid" class="grid grid-cols-1 gap-4">
                <div class="bg-white dark:bg-stone-900 border-2 border-black dark:border-white p-6 block-shadow-sm flex items-center justify-between animate-pulse">
                    <p class="font-brutalist text-sm dark:text-white tracking-widest">BOOTING...</p>
                </div>
            </div>
        </section>
    </div>

    <footer class="bg-white dark:bg-stone-900 border-t-4 border-black dark:border-white p-8 mt-20">
        <div class="max-w-6xl mx-auto flex flex-col md:flex-row justify-between items-center gap-8">
            <h6 class="font-brutalist text-xl dark:text-white">SATELLITE_VOX</h6>
            <p class="text-[9px] font-bold text-gray-500 uppercase tracking-[0.2em]">© 2026 ORBITAL ARCHIVE. NO COMPROMISE.</p>
        </div>
    </footer>

    <div id="notification-area" class="fixed bottom-6 right-6 z-[100] flex flex-col gap-2"></div>
    <script src="app.js"></script>
</body>
</html>
