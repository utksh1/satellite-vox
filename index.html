<!DOCTYPE html>
<html lang="en">
<!-- 
    PRISMLINK | THE ARCHITECT OF SHADOWS
    Designed for the bold. Built for the Capstone.
    
    Aesthetic: Dark Mode Glassmorphism
    Status: Milestone 1 Complete
-->
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PrismLink | Digital Architect of Shadows</title>
    <meta name="description" content="A premium, glassmorphic URL shortener and personal link vault dashboard. Built with the 1pt.co API.">
    
    <!-- We're using Outfit for that modern, architectural feel -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <!-- Link to the visual system -->
    <link rel="stylesheet" href="styles.css">
    
    <!-- Minimalist Favicon -->
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
</head>
<body class="dark" id="prism-body">
    <!-- These spheres are the soul of the background -->
    <div class="glow-sphere sphere-1"></div>
    <div class="glow-sphere sphere-2"></div>

    <header class="prism-header">
        <div class="logo-area">
            <h1 id="main-title">PrismLink<span class="shadow">.</span></h1>
            <p class="tagline">The Architect of Shadows</p>
        </div>
        <!-- I've wired this up in app.js as ui.toggle -->
        <button id="theme-toggle" class="icon-btn" aria-label="Toggle Theme">
            <svg id="moon-icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
            <svg id="sun-icon" class="hidden" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
        </button>
    </header>

    <main class="prism-main">
        <!-- THE FORGE: Where URLs come to be transformed -->
        <section id="shortener-core" class="glass-panel main-forge">
            <div class="input-group">
                <input type="url" id="original-url-input" placeholder="Paste your cumbersome URL here..." aria-label="Original URL">
                <input type="text" id="custom-short-input" placeholder="Custom Backhalf (Optional)" aria-label="Custom Short Code">
                <button id="forge-btn" class="primary-btn">Forge Link</button>
            </div>
            <!-- Notifications will appear here -->
            <div id="status-display" class="status-msg hidden"></div>
        </section>

        <!-- THE VAULT: Your personal digital history -->
        <section id="vault-dashboard" class="vault-section">
            <!-- Controls for sorting and filtering your stash -->
            <div class="vault-controls">
                <div class="search-box">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                    <input type="text" id="vault-search" placeholder="Filter through your links..." aria-label="Search Vault">
                </div>
                <div class="sort-controls">
                    <span class="label">Sort By:</span>
                    <select id="sort-select" aria-label="Sort Options">
                        <option value="newest">Newest First</option>
                        <option value="oldest">Oldest First</option>
                        <option value="alphabetical">Alphabetical</option>
                    </select>
                </div>
            </div>

            <!-- This grid is dynamically populated by app.js | renderVault() -->
            <div id="link-vault-grid" class="vault-grid">
                <div class="empty-state">Loading your vault from the void...</div>
            </div>
        </section>
    </main>

    <footer class="prism-footer">
        <p>&copy; 2026 PrismLink | Built with ❤️ for The Velvet Void</p>
    </footer>

    <!-- Toasts and feedback appear here -->
    <div id="notification-area" class="notification-area"></div>

    <!-- The brain behind the beauty -->
    <script src="app.js"></script>
</body>
</html>
