<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>SATELLITE_VOX | ORBITAL_ARCHIVE</title>

    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Space+Grotesk:wght@700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="styles.css">

    <script id="tailwind-config">
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        archive: {
                            50: "#FFFCF0",
                            100: "#FFFAE0",
                            200: "#FFF4BD",
                            300: "#FFEA80",
                            400: "#FFDF3D",
                            500: "#F5CC00",
                            600: "#CCAA00",
                            700: "#A88C00",
                            800: "#8A7300",
                            900: "#665500",
                            950: "#332A00"
                        },
                        alert: "#B93815"
                    },
                    fontFamily: {
                        brutalist: ["Archivo Black", "sans-serif"],
                        wide: ["Space Grotesk", "sans-serif"],
                        mono: ["JetBrains Mono", "monospace"]
                    }
                },
            },
        }
    </script>
</head>
<body class="min-h-screen structural-grid bg-archive-50 text-archive-950 selection:bg-archive-400 selection:text-archive-950 dark:bg-archive-950 dark:text-archive-50 transition-colors duration-300" id="prism-body">
    <header class="border-b-4 border-archive-950 dark:border-archive-100 bg-archive-100 dark:bg-archive-900 p-6 sticky top-0 z-50 flex justify-between items-center gap-6">
        <div class="flex items-center gap-4">
            <h1 class="font-brutalist text-2xl tracking-tighter text-archive-950 dark:text-archive-50 uppercase">SATELLITE_VOX</h1>
            <span class="hidden md:block bg-archive-300 dark:bg-archive-400 border-2 border-archive-950 dark:border-archive-950 px-2 py-0.5 text-[10px] font-bold text-archive-950 uppercase tracking-widest">UPLINK_STABLE</span>
        </div>
        <nav class="flex gap-3">
            <button id="refresh-btn" class="border-2 border-archive-950 dark:border-archive-100 px-4 py-2 bg-alert text-white text-[10px] font-bold uppercase flex items-center gap-2 hover:bg-archive-950 hover:text-archive-50 dark:hover:bg-archive-50 dark:hover:text-archive-950 transition-all active:scale-95">
                <span class="material-symbols-outlined text-sm">sync</span> PULL
            </button>
            <button id="theme-toggle" class="border-2 border-archive-950 dark:border-archive-100 px-4 py-2 bg-archive-50 dark:bg-archive-800 text-archive-950 dark:text-archive-50 text-[10px] font-bold uppercase hover:bg-archive-950 hover:text-archive-50 dark:hover:bg-archive-200 dark:hover:text-archive-950 transition-all active:scale-95">
                THEME
            </button>
        </nav>
    </header>

    <div class="max-w-6xl mx-auto w-full px-6 py-12 space-y-12">
        <section class="bg-archive-100 dark:bg-archive-900 border-[6px] border-archive-950 dark:border-archive-100 p-8 block-shadow">
            <div class="flex items-center gap-3 mb-6 border-b-2 border-archive-950 dark:border-archive-100 pb-4">
                <span class="bg-archive-300 dark:bg-archive-400 border-2 border-archive-950 dark:border-archive-950 px-2 py-0.5 font-bold text-[10px] text-archive-950">UPLINK_01</span>
                <h3 class="font-brutalist text-xl text-archive-950 dark:text-archive-50 uppercase">Controller</h3>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-12 gap-6">
                <div class="md:col-span-12 space-y-2">
                    <label class="text-[10px] font-bold text-archive-800 dark:text-archive-300 uppercase tracking-widest">Target_Query</label>
                    <div class="flex flex-col md:flex-row gap-3">
                        <input id="vault-search" class="w-full bg-archive-50 dark:bg-archive-950 border-4 border-archive-950 dark:border-archive-100 p-4 focus:ring-0 focus:bg-white dark:focus:bg-archive-800 text-lg font-mono uppercase text-archive-950 dark:text-archive-50 placeholder:text-archive-700 dark:placeholder:text-archive-300" placeholder="NAME / NORAD_ID" type="text"/>
                        <select id="sort-select" class="bg-archive-50 dark:bg-archive-950 border-4 border-archive-950 dark:border-archive-100 p-4 font-bold text-sm text-archive-950 dark:text-archive-50 uppercase">
                            <option value="name">NAME</option>
                            <option value="id">SID</option>
                            <option value="popularity">POP</option>
                        </select>
                    </div>
                </div>
            </div>
        </section>

        <section class="space-y-6">
            <div class="flex justify-between items-end border-b-4 border-archive-950 dark:border-archive-100 pb-4">
                <h4 class="font-brutalist text-2xl text-archive-950 dark:text-archive-50 uppercase">Telemetry_Logs</h4>
                <p class="text-[10px] font-bold text-archive-700 dark:text-archive-300 uppercase tracking-widest">Live_Archive</p>
            </div>

            <div id="link-vault-grid" class="grid grid-cols-1 gap-4">
                <div class="status-card">
                    <p class="font-brutalist text-sm tracking-widest">BOOTING...</p>
                </div>
            </div>
        </section>
    </div>

    <footer class="bg-archive-100 dark:bg-archive-900 border-t-4 border-archive-950 dark:border-archive-100 p-8 mt-20">
        <div class="max-w-6xl mx-auto flex flex-col md:flex-row justify-between items-center gap-8">
            <h6 class="font-brutalist text-xl text-archive-950 dark:text-archive-50">SATELLITE_VOX</h6>
            <p class="text-[9px] font-bold text-archive-700 dark:text-archive-300 uppercase tracking-[0.2em]">© 2026 ORBITAL ARCHIVE. NO COMPROMISE.</p>
        </div>
    </footer>

    <div id="notification-area" class="fixed bottom-6 right-6 z-[100] flex flex-col gap-2"></div>
    <script src="app.js"></script>
</body>
</html>
